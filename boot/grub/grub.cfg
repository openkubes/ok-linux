# okl — OpenKubes Linux GRUB Configuration

set default=0
set timeout=5

menuentry "okl — OpenKubes Linux" {
  linux /boot/vmlinuz \
    root=/dev/sda1 \
    ro quiet splash \
    net.ifnames=0 \
    biosdevname=0 \
    iommu=pt \
    intel_iommu=on \
    amd_iommu=on \
    vfio_iommu_type1.allow_unsafe_interrupts=1 \
    kvm.ignore_msrs=1
  initrd /boot/initrd.img
}

menuentry "okl — Recovery Mode" {
  linux /boot/vmlinuz \
    root=/dev/sda1 \
    ro recovery nomodeset \
    net.ifnames=0
  initrd /boot/initrd.img
}
